<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Course Database — Golf Broadcast Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Azeret+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#05100a;--s1:#0b1c10;--s2:#112016;--s3:#18281c;
  --bdr:rgba(255,255,255,.06);--bdr2:rgba(255,255,255,.11);
  --gold:#c9aa4e;--gold2:#e8cb72;--green:#2d6b38;--green2:#3d8e4a;--green3:#50ae5c;
  --cream:#e0d7c2;--muted:#66786a;--dim:#3e4e40;--white:#f3efe4;--red:#a02818;
  --mono:'Azeret Mono',monospace;--serif:'Libre Baskerville',serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--cream);font-family:var(--mono);font-size:13px;min-height:100vh}
.hdr{display:flex;align-items:center;gap:12px;padding:13px 24px;
  background:rgba(5,16,10,.97);border-bottom:1px solid var(--bdr);
  backdrop-filter:blur(14px);position:sticky;top:0;z-index:50}
.logo{font-family:var(--serif);font-size:1.2rem;font-weight:700;color:var(--gold)}
.logo-sub{font-size:.52rem;font-family:var(--mono);color:var(--muted);letter-spacing:.2em;text-transform:uppercase;margin-left:7px}
.hdr-right{margin-left:auto;display:flex;gap:8px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border-radius:3px;border:none;cursor:pointer;font-family:var(--mono);font-size:.58rem;letter-spacing:.15em;text-transform:uppercase;font-weight:600;transition:all .18s}
.btn-gold{background:var(--gold);color:#05100a}.btn-gold:hover{background:var(--gold2);transform:translateY(-1px)}
.btn-outline{background:transparent;border:1px solid var(--bdr2);color:var(--cream)}.btn-outline:hover{border-color:var(--gold);color:var(--gold)}
.btn-ghost{background:transparent;border:1px solid var(--bdr);color:var(--muted);padding:6px 12px}.btn-ghost:hover{border-color:var(--muted);color:var(--cream)}
.btn-sm{padding:5px 11px;font-size:.54rem}.btn-xs{padding:3px 8px;font-size:.5rem}
.btn-red{background:transparent;border:1px solid rgba(160,40,24,.4);color:#e08070}.btn-red:hover{border-color:var(--red);color:var(--red)}
main{max-width:1100px;margin:0 auto;padding:28px 24px;display:grid;grid-template-columns:320px 1fr;gap:20px;align-items:start}
.panel{background:var(--s1);border:1px solid var(--bdr);border-radius:5px;overflow:hidden}
.panel-hdr{padding:14px 18px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between}
.panel-title{font-family:var(--serif);font-size:1rem;font-weight:700;color:var(--gold2)}
.panel-body{padding:16px 18px;display:flex;flex-direction:column;gap:10px}
.fg{display:flex;flex-direction:column;gap:6px}
.fl{font-size:.52rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted)}
.ti{background:var(--s2);border:1px solid var(--bdr2);color:var(--cream);padding:8px 12px;border-radius:3px;font-family:var(--mono);font-size:.72rem;outline:none;transition:border-color .2s;width:100%}
.ti:focus{border-color:var(--gold)}.ti::placeholder{color:var(--dim)}
/* Course list */
.course-list{display:flex;flex-direction:column;gap:6px}
.course-item{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--s2);border:1px solid var(--bdr);border-radius:3px;cursor:pointer;transition:all .15s}
.course-item:hover{border-color:var(--bdr2)}.course-item.active{border-color:rgba(201,170,78,.4);background:rgba(201,170,78,.06)}
.ci-info{flex:1;min-width:0}
.ci-name{font-size:.72rem;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ci-holes{font-size:.56rem;color:var(--muted);letter-spacing:.06em;margin-top:2px}
.ci-actions{display:flex;gap:4px;opacity:0;transition:opacity .15s}
.course-item:hover .ci-actions{opacity:1}
/* Hole grid editor */
.hole-table{width:100%;border-collapse:collapse}
.hole-table th{font-size:.52rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);padding:6px 8px;text-align:left;border-bottom:1px solid var(--bdr);background:var(--s2)}
.hole-table td{padding:5px 6px;border-bottom:1px solid var(--bdr)}
.hole-table tr:last-child td{border-bottom:none}
.hole-table tr:hover td{background:rgba(255,255,255,.02)}
.hn{font-size:.62rem;color:var(--muted);width:36px;text-align:center}
.hole-ti{background:var(--s2);border:1px solid var(--bdr);color:var(--cream);padding:5px 8px;border-radius:2px;font-family:var(--mono);font-size:.68rem;width:100%;outline:none;transition:border-color .15s;text-align:center}
.hole-ti:focus{border-color:var(--gold)}
.totals-row td{background:var(--s3)!important;font-size:.62rem;color:var(--gold2);font-weight:600;padding:7px 6px}
/* Spinner */
.spinner{width:24px;height:24px;border:2px solid var(--bdr2);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin:20px auto}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:24px;font-size:.6rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
/* Toast */
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(46px);background:var(--s2);border:1px solid rgba(201,170,78,.2);color:var(--cream);padding:8px 14px;border-radius:20px;font-size:.6rem;letter-spacing:.06em;z-index:9998;transition:transform .3s cubic-bezier(.34,1.56,.64,1);pointer-events:none}
.toast.on{transform:translateX(-50%) translateY(0)}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.07);border-radius:2px}
</style>
</head>
<body>
<div class="hdr">
  <div class="logo">Golf Studio<span class="logo-sub">Course Database</span></div>
  <div class="hdr-right">
    <a href="/" class="btn btn-ghost btn-sm">← Dashboard</a>
  </div>
</div>

<main>
  <!-- Left: course list + add form -->
  <div style="display:flex;flex-direction:column;gap:14px">
    <!-- Add new course -->
    <div class="panel">
      <div class="panel-hdr"><div class="panel-title">Add Course</div></div>
      <div class="panel-body">
        <div class="fg"><div class="fl">Course Name</div>
          <input class="ti" id="cName" placeholder="e.g. Augusta National"></div>
        <div class="fg"><div class="fl">Location</div>
          <input class="ti" id="cLocation" placeholder="e.g. Augusta, GA"></div>
        <div class="fg"><div class="fl">Holes</div>
          <div style="display:flex;gap:7px">
            <button class="btn btn-outline btn-sm" id="cn9" onclick="setNewHoles(9)">9</button>
            <button class="btn btn-gold btn-sm" id="cn18" onclick="setNewHoles(18)">18</button>
          </div>
        </div>
        <button class="btn btn-gold" style="width:100%;margin-top:4px" onclick="addCourse()">Add Course →</button>
      </div>
    </div>

    <!-- Course list -->
    <div class="panel">
      <div class="panel-hdr">
        <div class="panel-title">Saved Courses</div>
        <div id="courseCount" style="font-size:.56rem;color:var(--muted)">—</div>
      </div>
      <div class="panel-body" style="padding:10px">
        <div id="courseList"><div class="spinner"></div></div>
      </div>
    </div>
  </div>

  <!-- Right: hole editor -->
  <div class="panel" id="holeEditorPanel" style="display:none">
    <div class="panel-hdr">
      <div>
        <div class="panel-title" id="editorCourseName">—</div>
        <div style="font-size:.56rem;color:var(--muted);margin-top:2px" id="editorCourseLocation">—</div>
      </div>
      <div style="display:flex;gap:7px;align-items:center">
        <button class="btn btn-gold btn-sm" onclick="saveCourse()">Save ✓</button>
        <button class="btn btn-red btn-xs" onclick="deleteCourse()">Delete</button>
      </div>
    </div>
    <div class="panel-body" style="padding:0;overflow-x:auto">
      <table class="hole-table">
        <thead>
          <tr>
            <th style="width:36px;text-align:center">Hole</th>
            <th>Par</th>
            <th>Yardage</th>
          </tr>
        </thead>
        <tbody id="holeTableBody"></tbody>
        <tfoot>
          <tr class="totals-row">
            <td class="hn">TOT</td>
            <td id="totalPar">—</td>
            <td id="totalYards">—</td>
          </tr>
        </tfoot>
      </table>
    </div>
  </div>

  <!-- Empty state when no course selected -->
  <div class="panel" id="holeEditorEmpty">
    <div class="empty">← Select a course to edit hole data</div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp }   from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, doc, setDoc, getDoc, getDocs,
         deleteDoc, serverTimestamp, query, orderBy
       }                    from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

// !! PASTE YOUR FIREBASE CONFIG HERE !!
const firebaseConfig = {
  apiKey: "AIzaSyDiRzPk409QDK1q1SJ273uvA8co_Yin0bM",
  authDomain: "golf-highlight-studio.firebaseapp.com",
  projectId: "golf-highlight-studio",
  storageBucket: "golf-highlight-studio.firebasestorage.app",
  messagingSenderId: "180496097081",
  appId: "1:180496097081:web:6138fd176c777f41b212e8"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

let _courses = [];
let _activeCourse = null;
let _newHoles = 18;
let _toastT;

// ── INIT ──────────────────────────────────────────────────────────
loadCourses();

// ── HOLES TOGGLE ──────────────────────────────────────────────────
window.setNewHoles=function(n){
  _newHoles=n;
  ['cn9','cn18'].forEach(id=>document.getElementById(id).className='btn btn-outline btn-sm');
  document.getElementById('cn'+n).className='btn btn-gold btn-sm';
};

// ── LOAD COURSES ──────────────────────────────────────────────────
async function loadCourses(){
  try{
    const snap=await getDocs(query(collection(db,'courses'),orderBy('name','asc')));
    _courses=snap.docs.map(d=>({id:d.id,...d.data()}));
    renderCourseList();
  }catch(e){
    document.getElementById('courseList').innerHTML=`<div class="empty">Error: ${e.message}</div>`;
  }
}

function renderCourseList(){
  const wrap=document.getElementById('courseList');
  document.getElementById('courseCount').textContent=_courses.length+' course'+ (_courses.length!==1?'s':'');
  if(!_courses.length){wrap.innerHTML='<div class="empty">No courses yet</div>';return;}
  wrap.innerHTML='';
  _courses.forEach(c=>{
    const d=document.createElement('div');
    d.className='course-item'+(_activeCourse?.id===c.id?' active':'');
    d.id='ci-'+c.id;
    const holeCount=c.holes?.length||0;
    d.innerHTML=`
      <div class="ci-info">
        <div class="ci-name">${c.name}</div>
        <div class="ci-holes">${c.location||''}${c.location&&holeCount?' · ':''}${holeCount?holeCount+'-hole':''}</div>
      </div>
      <div class="ci-actions">
        <button class="btn btn-xs btn-red" onclick="confirmDelete('${c.id}',event)">✕</button>
      </div>`;
    d.onclick=()=>selectCourse(c);
    wrap.appendChild(d);
  });
}

// ── ADD COURSE ────────────────────────────────────────────────────
window.addCourse=async function(){
  const name=document.getElementById('cName').value.trim();
  const location=document.getElementById('cLocation').value.trim();
  if(!name){toast('Enter a course name');return;}
  const id=name.toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'')+'-'+Date.now().toString(36);
  const holes=Array.from({length:_newHoles},()=>({par:4,yardage:400}));
  const data={name,location,holes,createdAt:serverTimestamp()};
  try{
    await setDoc(doc(db,'courses',id),data);
    document.getElementById('cName').value='';
    document.getElementById('cLocation').value='';
    toast('Course added!');
    await loadCourses();
    selectCourse({id,...data});
  }catch(e){toast('Error: '+e.message);}
};

// ── SELECT COURSE ─────────────────────────────────────────────────
function selectCourse(course){
  _activeCourse={...course};
  document.getElementById('holeEditorPanel').style.display='';
  document.getElementById('holeEditorEmpty').style.display='none';
  document.getElementById('editorCourseName').textContent=course.name;
  document.getElementById('editorCourseLocation').textContent=course.location||'';
  buildHoleTable(course.holes||[]);
  renderCourseList(); // refresh active highlight
}

function buildHoleTable(holes){
  const tbody=document.getElementById('holeTableBody'); tbody.innerHTML='';
  holes.forEach((h,i)=>{
    const tr=document.createElement('tr');
    tr.innerHTML=`
      <td class="hn">${i+1}</td>
      <td><input class="hole-ti" id="par-${i}" type="number" min="3" max="6" value="${h.par||4}"
        oninput="updateTotals()" style="width:60px"></td>
      <td><input class="hole-ti" id="yds-${i}" type="number" min="50" max="700" value="${h.yardage||400}"
        oninput="updateTotals()" style="width:80px"></td>`;
    tbody.appendChild(tr);
  });
  updateTotals();
}

window.updateTotals=function(){
  if(!_activeCourse) return;
  let totalPar=0, totalYds=0;
  const n=_activeCourse.holes?.length||0;
  for(let i=0;i<n;i++){
    const p=parseInt(document.getElementById('par-'+i)?.value)||0;
    const y=parseInt(document.getElementById('yds-'+i)?.value)||0;
    totalPar+=p; totalYds+=y;
  }
  document.getElementById('totalPar').textContent=totalPar||'—';
  document.getElementById('totalYards').textContent=totalYds?totalYds.toLocaleString()+' yds':'—';
};

// ── SAVE COURSE ───────────────────────────────────────────────────
window.saveCourse=async function(){
  if(!_activeCourse) return;
  const n=_activeCourse.holes?.length||0;
  const holes=Array.from({length:n},(_,i)=>({
    par:parseInt(document.getElementById('par-'+i)?.value)||4,
    yardage:parseInt(document.getElementById('yds-'+i)?.value)||400,
  }));
  try{
    await setDoc(doc(db,'courses',_activeCourse.id),{
      ..._activeCourse, holes, updatedAt:serverTimestamp()
    });
    _activeCourse.holes=holes;
    // Update local cache
    const idx=_courses.findIndex(c=>c.id===_activeCourse.id);
    if(idx>=0) _courses[idx]={..._courses[idx],holes};
    toast('Course saved ✓');
  }catch(e){toast('Save failed: '+e.message);}
};

// ── DELETE COURSE ─────────────────────────────────────────────────
window.deleteCourse=async function(){
  if(!_activeCourse) return;
  if(!confirm(`Delete "${_activeCourse.name}"? This cannot be undone.`)) return;
  await confirmDelete(_activeCourse.id);
};
window.confirmDelete=async function(id,e){
  if(e) e.stopPropagation();
  if(!confirm('Delete this course?')) return;
  try{
    await deleteDoc(doc(db,'courses',id));
    if(_activeCourse?.id===id){
      _activeCourse=null;
      document.getElementById('holeEditorPanel').style.display='none';
      document.getElementById('holeEditorEmpty').style.display='';
    }
    await loadCourses();
    toast('Course deleted');
  }catch(e){toast('Delete failed: '+e.message);}
};

// ── UTILS ─────────────────────────────────────────────────────────
function toast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('on');
  clearTimeout(_toastT); _toastT=setTimeout(()=>t.classList.remove('on'),2800);
}
</script>
</body>
</html>
